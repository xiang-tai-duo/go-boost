<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Test Tool</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 20px; box-sizing: border-box;">
    <div style="max-width: 800px; margin: 0 auto; padding: 20px;">
        <h1 style="text-align: center; margin-bottom: 20px;">WebSocket Test Tool</h1>
        <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #000;">
            <h2 style="font-size: 18px; margin-bottom: 15px;">Connection Settings</h2>
            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <label style="display: inline-block; min-width: 120px; font-weight: bold; flex-shrink: 0;">WebSocket URL:</label>
                <input type="text" id="wsUrl" value="" placeholder="" style="width: 300px; padding: 8px; border: 1px solid #000; font-size: 14px;">
            </div>
            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <button id="connectBtn" style="padding: 8px 16px; border: 1px solid #000; cursor: pointer; margin-right: 10px; font-size: 14px;">Connect</button>
                <button id="disconnectBtn" disabled style="padding: 8px 16px; border: 1px solid #000; cursor: not-allowed; margin-right: 10px; font-size: 14px;">Disconnect</button>
                <span id="connectionStatus" style="color: red; font-weight: bold; margin-left: 10px;">Disconnected</span>
            </div>
        </div>
        <div id="sendMessageDiv" style="margin-bottom: 20px; padding: 15px; border: 1px solid #000; opacity: 0.5;">
            <h2 style="font-size: 18px; margin-bottom: 15px;">Send Message</h2>
            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <label style="display: inline-block; min-width: 120px; font-weight: bold; flex-shrink: 0;">Message Content:</label>
                <input type="text" id="messageText" value="Hello, WebSocket!" placeholder="Enter message content" style="width: 300px; padding: 8px; border: 1px solid #000; font-size: 14px;">
            </div>
            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                <button id="sendBtn" style="padding: 8px 16px; border: 1px solid #000; cursor: pointer; margin-right: 10px; font-size: 14px;">Send</button>
                <button id="clearBtn" style="padding: 8px 16px; border: 1px solid #000; cursor: pointer; margin-right: 10px; font-size: 14px;">Clear</button>
            </div>
        </div>
        <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #000;">
            <h2 style="font-size: 18px; margin-bottom: 15px;">Log</h2>
            <div id="log" style="height: 200px; overflow-y: scroll; border: 1px solid #000; padding: 10px; font-family: monospace; margin-top: 10px;"></div>
        </div>
    </div>
    <script>
        // DOM Elements
        const wsUrlInput = document.getElementById('wsUrl');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        const messageTextInput = document.getElementById('messageText');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const logDiv = document.getElementById('log');
        const sendMessageDiv = document.getElementById('sendMessageDiv');
        // WebSocket Instance
        let ws = null;
        
        // Initialize message input as disabled
        messageTextInput.disabled = true;
        /**
         * Adds a log to the log history
         * @param {string} type - Type of log (received, sent, error, info)
         * @param {string} content - Log content
         */
        const addLog = (type, content) => {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.style.marginBottom = '5px';
            messageDiv.style.padding = '5px';
            messageDiv.style.fontSize = '14px';
            messageDiv.style.lineHeight = '1.4';
            messageDiv.textContent = `${new Date().toLocaleTimeString()}: ${content}`;
            logDiv.appendChild(messageDiv);
            logDiv.scrollTop = logDiv.scrollHeight;
        };
        /**
         * Connects to WebSocket server
         */
        const connect = () => {
            const url = wsUrlInput.value;
            try {
                ws = new WebSocket(url);
                ws.onopen = () => {
                    addLog('info', `Connected to ${url}`);
                    connectionStatus.textContent = 'Connected';
                    connectionStatus.style.color = 'green';
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    sendBtn.disabled = false;
                    messageTextInput.disabled = false;
                    sendMessageDiv.style.opacity = '1';
                };
                ws.onmessage = (event) => {
                    addLog('received', `Received: ${event.data}`);
                };
                ws.onclose = () => {
                    addLog('info', 'Connection closed');
                    connectionStatus.textContent = 'Disconnected';
                    connectionStatus.style.color = 'red';
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    sendBtn.disabled = true;
                    messageTextInput.disabled = true;
                    sendMessageDiv.style.opacity = '0.5';
                };
                ws.onerror = (error) => {
                    let errorMessage = 'Unknown error';
                    if (error instanceof Error) {
                        errorMessage = error.message;
                    } else if (error.type) {
                        errorMessage = error.type;
                    }
                    addLog('error', `Connection error: ${errorMessage}`);
                };
            } catch (error) {
                addLog('error', `Connection failed: ${error.message}`);
            }
        };
        /**
         * Disconnects from WebSocket server
         */
        const disconnect = () => {
            if (ws) {
                ws.close();
                ws = null;
            }
        };
        /**
         * Sends a message to the WebSocket server
         */
        const send = () => {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog('error', 'Not connected to server');
                return;
            }
            const message = messageTextInput.value;
            const jsonMessage = JSON.stringify({ data: message });
            ws.send(jsonMessage);
            addLog('sent', `Sent: ${jsonMessage}`);
        };
        /**
         * Clears all logs from the log history
         */
        const clear = () => {
            logDiv.innerHTML = '';
        };
        /**
         * Parses URL parameters
         * @returns {Object} - Parsed URL parameters
         */
        const parseURLParams = () => {
            const params = {};
            const url = window.location.href;
            const paramStart = url.indexOf('?');
            if (paramStart === -1) {
                return params;
            }
            const paramString = url.substring(paramStart + 1);
            const paramPairs = paramString.split('&');
            for (const pair of paramPairs) {
                const [key, value] = pair.split('=').map(decodeURIComponent);
                if (key) {
                    params[key] = value;
                }
            }
            return params;
        };
        // Event Listeners
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        sendBtn.addEventListener('click', send);
        clearBtn.addEventListener('click', clear);
        messageTextInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                send();
            }
        });
        // Update placeholder when URL input changes
        wsUrlInput.addEventListener('input', () => {
            if (wsUrlInput.value) {
                wsUrlInput.placeholder = wsUrlInput.value;
            }
        });
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Parse URL params and set WebSocket URL if available
            const urlParams = parseURLParams();
            if (urlParams.ws) {
                wsUrlInput.value = urlParams.ws;
                wsUrlInput.placeholder = urlParams.ws;
            }
        });
    </script>
</body>
</html>
